name: Bot Bourse Telegram

# Permissions nécessaires pour que le bot puisse committer l'historique
permissions:
  contents: write

on:
  schedule:
    # GitHub Actions utilise l'heure UTC.
    # 17:00 UTC = 18:00 en hiver (CET) / 19:00 en été (CEST).
    # Tous les jours ouvrés (lundi → vendredi) à 17:00 UTC.
    - cron: "0 17 * * 1-5"
  workflow_dispatch:

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Lancer le screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_pro.py

      # Le script a créé / mis à jour predictions_history.json.
      # On le committe dans le dépôt pour que la prochaine exécution
      # puisse valider les prédictions d'aujourd'hui.
      - name: Sauvegarder l'historique des prédictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions_history.json
          git diff --staged --quiet || git commit -m "Historique prédictions $(date +'%Y-%m-%d')"
          git push
