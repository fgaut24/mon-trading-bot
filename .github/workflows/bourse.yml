name: Bot Bourse Telegram

# Permissions nécessaires pour que le bot puisse committer l'historique
permissions:
  contents: write

on:
  schedule:
    # GitHub Actions raisonne en heure UTC.
    # 16:45 UTC = 18:45 en été (CEST) / 17:45 en hiver (CET)
    # → toujours après la clôture de la Bourse de Paris (17:30 locale).
    - cron: "45 16 * * 1-5"
  # Permet de lancer le robot à la main via le bouton "Run workflow" :
  workflow_dispatch:

jobs:
  rapport:
    runs-on: ubuntu-latest
    steps:
      # 1. Récupère le contenu de votre dépôt (dont screener_pro.py et requirements.txt)
      - name: Récupérer le code
        uses: actions/checkout@v4

      # 2. Installe Python (avec mise en cache des dépendances pour accélérer)
      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # 3. Installe TOUTES les bibliothèques depuis le fichier centralisé
      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # 4. Lance le robot. Les secrets du dépôt sont injectés ici en variables
      #    d'environnement, sous les noms EXACTS que lit votre script Python.
      - name: Lancer le screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_pro.py

      # Le script a créé / mis à jour predictions_history.json.
      # On le committe dans le dépôt pour que la prochaine exécution
      # puisse valider les prédictions d'aujourd'hui.
      - name: Sauvegarder l'historique des prédictions
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add predictions_history.json
          git diff --staged --quiet || git commit -m "Historique prédictions $(date +'%Y-%m-%d')"
          git push
