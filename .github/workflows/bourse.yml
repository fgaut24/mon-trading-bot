name: Rapport Bourse Quotidien

on:
  schedule:
    # 07:00 UTC correspond à 09:00 heure de Paris (heure d'été) du lundi au vendredi
    - cron: '11 7 * * 1-5'
  workflow_dispatch: # Ce bouton magique permet de lancer un test manuellement !

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 💾 Recuperation du code
        uses: actions/checkout@v4

      - name: 🐍 Installation de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: ⚙️ Installation des outils boursiers
        run: |
          pip install yfinance pandas requests numpy matplotlib

      - name: 🚀 Lancement du Screener
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_pro.py
