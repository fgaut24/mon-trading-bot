name: Alertes Oracle (intraday)

permissions:
  contents: read

on:
  # Toutes les heures entre 7h et 17h UTC, du lundi au vendredi.
  # 7h-17h UTC = 8h-18h en hiver (CET) / 9h-19h en été (CEST).
  # Couvre l'ouverture à la clôture de la Bourse de Paris.
  schedule:
    - cron: "0 7-17 * * 1-5"
  # Déclenchement manuel depuis l'onglet Actions
  workflow_dispatch:

jobs:
  alertes:
    runs-on: ubuntu-latest
    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      # Lance uniquement le mode alertes.
      # Aucun message Telegram n'est envoyé si aucun signal urgent n'est détecté.
      - name: Lancer les alertes
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_pro.py --alertes
