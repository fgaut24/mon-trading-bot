name: Bot Bourse Quotidien

on:
  schedule:
    # Exécution à 15h45 UTC (soit 17h45 heure de Paris en été) du lundi au vendredi
    - cron: '45 15 * * 1-5'
  workflow_dispatch: # Permet aussi de lancer le bot manuellement depuis le site web GitHub

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Récupérer le code
        uses: actions/checkout@v3
      
      - name: 🐍 Installer Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.13'
      
      - name: 📦 Installer les librairies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: 🚀 Lancer l'Oracle Quantamental
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python screener_pro.py
